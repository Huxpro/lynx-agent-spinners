name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - 'src/data/**'
      - 'apps/lynx/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (lynx workspace only)
        run: pnpm --filter ./apps/lynx install --frozen-lockfile=false

      - name: Build Lynx bundles (lynx + web)
        run: pnpm --filter ./apps/lynx build

      - name: Extract spinner JSON for the deck
        run: node presentation/extract-spinners.mjs

      - name: Sync Lynx-for-Web embed
        run: bash presentation/sync-lynx-app.sh

      - name: Upload Pages artifact (presentation/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
