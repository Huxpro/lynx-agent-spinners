name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - 'src/data/**'
      - 'src/lynx/**'
      - 'src/hooks/**'
      - 'apps/lynx/**'
      - 'apps/screens/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install (lynx + screens workspaces)
        run: |
          pnpm --filter ./apps/lynx install --no-frozen-lockfile
          pnpm --filter ./apps/screens install --no-frozen-lockfile

      - name: Build catalog Lynx app (lynx + web bundles)
        run: pnpm --filter ./apps/lynx build

      - name: Build signature-screens app (web bundle)
        run: pnpm --filter ./apps/screens build

      - name: Extract spinner JSON for landing + deck
        run: node presentation/extract-spinners.mjs

      - name: Sync bundles + web-core runtime into presentation/
        run: bash presentation/sync-lynx-app.sh

      - name: Upload Pages artifact (presentation/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
