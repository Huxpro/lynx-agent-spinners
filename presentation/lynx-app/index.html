<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lynx Agent Spinners · running on Lynx for Web</title>
<!-- COOP/COEP shim for static hosts that can't set headers (e.g. GitHub Pages).
     Must run before any other script. -->
<script src="../coi-serviceworker.js"></script>
<link rel="stylesheet" href="../static/css/client.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  lynx-view {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  .ribbon {
    position: fixed;
    top: 12px;
    left: 12px;
    background: rgba(255, 90, 95, 0.12);
    border: 1px solid rgba(255, 90, 95, 0.35);
    color: #ff8c8f;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 999px;
    z-index: 10;
    backdrop-filter: blur(8px);
    pointer-events: auto;
  }
  .ribbon a { color: inherit; text-decoration: none; }
  .ribbon a:hover { text-decoration: underline; }
  .ribbon code { color: #ffd5d7; }
</style>
<script type="module" src="../static/js/client.js"></script>
</head>
<body>
  <div class="ribbon">Running on <strong>Lynx for Web</strong> · <code>main.web.bundle</code> · <a href="../">back to deck</a></div>
  <lynx-view url="./main.web.bundle"></lynx-view>
</body>
</html>
